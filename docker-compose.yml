services:
  upcycle-back:
    image: alpine:3.21
    container_name: upcycle-back
    restart: always
    environment:
      - APP_ENV=production
    volumes:
      - /mnt/truenas-web/back/api-upagain:/usr/local/bin/api-upagain
      - /mnt/truenas-web/back/.env.production:/root/.env.production
      - ./.env:/root/.env
      - /mnt/truenas-web/back/.env.production:/root/.env.development
    working_dir: /root
    command: ["/usr/local/bin/api-upagain"]

  upcycle-front:
    image: nginx:stable-alpine
    container_name: upcycle-front
    restart: always
    ports:
      - "80:80"
    volumes:
      - /mnt/truenas-web/front:/usr/share/nginx/html
      - ./front/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - upcycle-back

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - upcycle-front
