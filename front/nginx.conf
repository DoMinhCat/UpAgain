server {
    listen 80;
    server_name upcycleconnect.org;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        # Ensure we remove the /api prefix before sending to backend
        rewrite ^/api/(.*)$ /$1 break;
        
        proxy_pass http://upcycle-back:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Debug headers (optional, can be removed later)
        add_header X-Proxy-Target http://upcycle-back:8080 always;
    }

    # Support for URLs without trailing slash
    location = /api {
        return 301 /api/;
    }
}
