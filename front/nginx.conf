server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        # The trailing slash here automatically strips /api/ from the request before passing to backend
        proxy_pass http://upcycle-back:8080/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Debug header to confirm request reached this location
        add_header X-Proxy-Location "api-slash" always;
    }

    # Direct match for /api without trailing slash to prevent 301 redirect on POST
    location /api {
        proxy_pass http://upcycle-back:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Proxy-Location "api-no-slash" always;
    }
}
