name: Deploy UpAgain

on:
  push:
    branches:
      - arnaud/ci

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Verify NAS Access
        run: |
          echo "Checking NAS access..."
          ls -ld /mnt/truenas-web/back/
          ls -ld /mnt/truenas-web/front/
          touch /mnt/truenas-web/back/ci_test && rm /mnt/truenas-web/back/ci_test
          echo "NAS access verified."

      - name: Stop Containers
        run: |
          docker-compose down --remove-orphans

      - name: Build Backend
        working-directory: back
        run: |
          /usr/local/go/bin/go clean -modcache -cache
          CGO_ENABLED=0 GOOS=linux /usr/local/go/bin/go build -o api-upagain main.go
          rm -f /mnt/truenas-web/back/api-upagain
          cp api-upagain /mnt/truenas-web/back/
          chmod +x /mnt/truenas-web/back/api-upagain

      - name: Build Frontend
        working-directory: front
        run: |
          npm install
          npm run build
          cp -r dist/* /mnt/truenas-web/front/

      - name: Start Containers
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          docker-compose up -d --remove-orphans

