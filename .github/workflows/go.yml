# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "back/**"
  pull_request:
    branches: ["main"]
    paths:
      - "back/**"

jobs:
  build:
    runs-on: ubuntu-latest
    # This must be indented inside the job 'build'
    defaults:
      run:
        working-directory: ./back

    steps: # Indented to belong to the 'build' job
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.1"
          cache-dependency-path: back/go.mod

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
