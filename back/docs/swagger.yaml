info:
  contact: {}
paths:
  /accounts/:
    get:
      description: Get a list of all accounts with filters and pagination
      parameters:
      - description: Fetch deleted accounts
        in: query
        name: is_deleted
        required: true
        type: boolean
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of accounts and pagination info
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Get all accounts (Admin)
      tags:
      - account
  /accounts/{id_account}/:
    delete:
      description: Marks an account as deleted
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Soft delete account
      tags:
      - account
    get:
      description: Get details of a specific account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountDetails'
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      summary: Get account details
      tags:
      - account
  /accounts/{id_account}/ban/:
    patch:
      consumes:
      - application/json
      description: Ban or unban an account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      - description: Current ban status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ToggleBanRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Toggle ban status
      tags:
      - account
  /accounts/{id_account}/password/:
    patch:
      consumes:
      - application/json
      description: Update the password of a specific account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      - description: New password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Update password
      tags:
      - account
  /accounts/{id_account}/recover/:
    patch:
      description: Restore a soft-deleted account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Recover account
      tags:
      - account
  /accounts/{id_account}/stats/:
    get:
      description: Get activity statistics for a specific account based on its role
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Stats (UserStats, ProStats, or EmployeeStats)
          schema: {}
        "400":
          description: Invalid request or role
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Get account stats
      tags:
      - account
  /accounts/{id_account}/update/:
    patch:
      consumes:
      - application/json
      description: Update details of a specific account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      - description: Account updates
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "409":
          description: Email or Username already exists
        "500":
          description: Internal server error
      summary: Update account
      tags:
      - account
  /accounts/count/:
    get:
      description: Get total count of accounts and increase since last month
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountCountStats'
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Get account count stats
      tags:
      - account
  /admin/items/history/:
    get:
      description: Get a paginated history of all items
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated items history
          schema:
            $ref: '#/definitions/models.PaginatedHistoryResponse'
        "400":
          description: Invalid pagination parameters
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      summary: Get items history
      tags:
      - validation
  /admin/validations/deposits/:
    get:
      description: Get a paginated list of pending deposits for admin
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated deposits
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid pagination parameters
        "500":
          description: Internal server error
      summary: Get pending deposits
      tags:
      - validation
  /admin/validations/deposits/{id}/:
    put:
      consumes:
      - application/json
      description: Approve or refuse a deposit
      parameters:
      - description: Deposit ID
        in: path
        name: id
        required: true
        type: integer
      - description: Validation decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ValidationActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Deposit status updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID or payload
        "500":
          description: Internal server error
      summary: Process deposit validation
      tags:
      - validation
  /admin/validations/events/{id}/:
    put:
      consumes:
      - application/json
      description: Approve or refuse an event
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      - description: Validation decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ValidationActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Event status updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID or payload
        "404":
          description: Event not found
        "500":
          description: Internal server error
      summary: Process event validation
      tags:
      - validation
  /admin/validations/listings/:
    get:
      description: Get a paginated list of pending listings for admin
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated listings
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid pagination parameters
        "500":
          description: Internal server error
      summary: Get pending listings
      tags:
      - validation
  /admin/validations/listings/{id}/:
    put:
      consumes:
      - application/json
      description: Approve or refuse a listing
      parameters:
      - description: Listing ID
        in: path
        name: id
        required: true
        type: integer
      - description: Validation decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ValidationActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Listing status updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID or payload
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Process listing validation
      tags:
      - validation
  /admin/validations/stats/:
    get:
      description: Get counts of pending, approved, and refused for all entity types
      produces:
      - application/json
      responses:
        "200":
          description: Validation stats
          schema:
            $ref: '#/definitions/models.ValidationStats'
        "500":
          description: Internal server error
      summary: Get validation stats
      tags:
      - validation
  /containers/:
    get:
      description: Get a list of all containers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Container'
            type: array
        "500":
          description: Internal server error
      summary: Get all containers
      tags:
      - container
    post:
      consumes:
      - application/json
      description: Create a new container
      parameters:
      - description: Container details
        in: body
        name: container
        required: true
        schema:
          $ref: '#/definitions/models.Container'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Container'
        "400":
          description: Invalid request or postal code
          schema:
            type: string
        "500":
          description: Creation failed
          schema:
            type: string
      summary: Create container
      tags:
      - container
  /containers/{id}/:
    delete:
      description: Soft delete a container by its ID
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
        "500":
          description: Internal error
          schema:
            type: string
      summary: Delete container
      tags:
      - container
    get:
      description: Get a single container by its ID
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Container'
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Container not found
          schema:
            type: string
      summary: Get container by ID
      tags:
      - container
    put:
      consumes:
      - application/json
      description: Update the status of a container
      parameters:
      - description: Container ID
        in: path
        name: id
        required: true
        type: integer
      - description: New status payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
        "500":
          description: Internal error
          schema:
            type: string
      summary: Update container status
      tags:
      - container
  /containers/count/:
    get:
      description: Get statistics about container counts (total and active)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ContainerCountStats'
        "401":
          description: Unauthorized
        "500":
          description: Internal error
          schema:
            type: string
      summary: Get container count stats
      tags:
      - container
  /employees/available/:
    get:
      description: Get a list of employees not occupied during a specific time range.
      parameters:
      - description: Start date (RFC3339 format, e.g., 2026-03-22T17:00:00Z)
        in: query
        name: start_at
        required: true
        type: string
      - description: End date (RFC3339 format, e.g., 2026-03-22T19:00:00Z)
        in: query
        name: end_at
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of available employees
          schema:
            $ref: '#/definitions/models.AvailableEmployeesResponse'
        "400":
          description: Invalid time format
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Get available employees
      tags:
      - employee
  /events/:
    get:
      consumes:
      - application/json
      description: Get list of all events with pagination, search, status and sort
        filters.
      parameters:
      - description: Current page number (default 1)
        in: query
        name: page
        type: integer
      - description: Number of events per page (default all)
        in: query
        name: limit
        type: integer
      - description: Search in title or city
        in: query
        name: search
        type: string
      - description: 'Filter by status: pending, approved, refused'
        in: query
        name: status
        type: string
      - description: Sort by field
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Events list retrieved successfully
          schema:
            $ref: '#/definitions/models.EventsListPagination'
        "400":
          description: Invalid query parameters
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Get all events
      tags:
      - event
    post:
      consumes:
      - multipart/form-data
      description: Create a new event from the provided multipart form data.
      parameters:
      - description: Event title
        in: formData
        name: title
        required: true
        type: string
      - description: Event description
        in: formData
        name: description
        type: string
      - description: Start date (RFC3339 format)
        in: formData
        name: start_at
        type: string
      - description: End date (RFC3339 format)
        in: formData
        name: end_at
        type: string
      - description: Event price
        in: formData
        name: price
        type: number
      - description: Event category (workshop, conference, meetups, exposition, other)
        in: formData
        name: category
        type: string
      - description: Max attendees
        in: formData
        name: capacity
        type: integer
      - description: City
        in: formData
        name: city
        type: string
      - description: Street
        in: formData
        name: street
        type: string
      - description: Additional location details
        in: formData
        name: location_detail
        type: string
      - description: Event images (multiple allowed)
        in: formData
        name: images
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Event created successfully
        "400":
          description: Invalid payload or parsing error
        "401":
