host: localhost:8080
info:
  contact: {}
  description: Backend API written in Golang that handles requests from the frontend.
  title: UpAgain backend Golang API
  version: "1.0"
paths:
  /accounts/:
    get:
      description: Get a list of all accounts with filters and pagination
      parameters:
      - description: Fetch deleted accounts
        in: query
        name: is_deleted
        required: true
        type: boolean
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of accounts and pagination info
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid parameters
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Get all accounts (Admin)
      tags:
      - account
  /accounts/{id_account}/:
    delete:
      description: Marks an account as deleted
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Soft delete account
      tags:
      - account
    get:
      description: Get details of a specific account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountDetails'
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      summary: Get account details
      tags:
      - account
  /accounts/{id_account}/ban/:
    patch:
      consumes:
      - application/json
      description: Ban or unban an account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      - description: Current ban status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ToggleBanRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Toggle ban status
      tags:
      - account
  /accounts/{id_account}/password/:
    patch:
      consumes:
      - application/json
      description: Update the password of a specific account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      - description: New password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdatePasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Update password
      tags:
      - account
  /accounts/{id_account}/recover/:
    patch:
      description: Restore a soft-deleted account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Recover account
      tags:
      - account
  /accounts/{id_account}/stats/:
    get:
      description: Get activity statistics for a specific account based on its role
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Stats (UserStats, ProStats, or EmployeeStats)
          schema: {}
        "400":
          description: Invalid request or role
        "401":
          description: Unauthorized
        "404":
          description: Account not found
        "500":
          description: Internal server error
      summary: Get account stats
      tags:
      - account
  /accounts/{id_account}/update/:
    patch:
      consumes:
      - application/json
      description: Update details of a specific account
      parameters:
      - description: Account ID
        in: path
        name: id_account
        required: true
        type: integer
      - description: Account updates
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "409":
          description: Email or Username already exists
        "500":
          description: Internal server error
      summary: Update account
      tags:
      - account
  /accounts/count/:
    get:
      description: Get total count of accounts and increase since last month
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AccountCountStats'
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      summary: Get account count stats
      tags:
      - account
  /admin/items/:
    get:
      description: Get a paginated list of all items with optional filters for search,
        sort, status, material, and category.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search by title or username
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by material
        in: query
        name: material
        type: string
      - description: Filter by category (listing or deposit)
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ItemListPagination'
        "400":
          description: Invalid query parameters
        "500":
          description: Internal server error
      summary: Get all items
      tags:
      - item
  /admin/items/{item_id}/:
    delete:
      description: Soft-delete an item (listing or deposit) by its ID. Admin can delete
        any item; users can only delete their own. Item that is reserved or completed
        can't be deleted
      parameters:
      - description: Item ID
        in: path
        name: item_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
        "401":
          description: Unauthorized
        "404":
          description: Item not found
        "500":
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Delete item
      tags:
      - item
    get:
      description: Get detailed information for a specific item including photos and
        owner username.
      parameters:
      - description: Item ID
        in: path
        name: item_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Item'
        "400":
          description: Invalid ID
        "404":
          description: Item not found
        "500":
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Get item details
      tags:
      - item
    patch:
      consumes:
      - application/json
      description: Update the status of an item (pending, approved, refused, deleted,
        completed). Admin and users only.
      parameters:
      - description: Item ID
        in: path
        name: item_id
        required: true
        type: integer
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ItemStatusUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Item status updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID or status
        "401":
          description: Unauthorized
        "404":
          description: Item not found
        "500":
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Update item status
      tags:
      - item
  /admin/items/count/:
    get:
      description: Get admin-level statistics for items including counts by status,
        material, category, and timeframe.
      parameters:
      - description: 'Timeframe filter: today, last_3_days, last_week, last_month,
          last_year, all'
        in: query
        name: timeframe
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ItemAdminStats'
        "400":
          description: Invalid timeframe
        "401":
          description: Unauthorized
        "500":
          description: Internal server error
      security:
      - ApiKeyAuth: []
      summary: Get item statistics
      tags:
      - item
  /admin/items/history/:
    get:
      description: Get a paginated history of all items
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by type
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated items history
          schema:
            $ref: '#/definitions/models.PaginatedHistoryResponse'
        "400":
          description: Invalid pagination parameters
        "403":
          description: Forbidden
        "500":
          description: Internal server error
      summary: Get items history
      tags:
      - validation
  /admin/validations/deposits/:
    get:
      description: Get a paginated list of pending deposits for admin
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated deposits
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid pagination parameters
        "500":
          description: Internal server error
      summary: Get pending deposits
      tags:
      - validation
  /admin/validations/deposits/{id}/:
    put:
      consumes:
      - application/json
      description: Approve or refuse a deposit
      parameters:
      - description: Deposit ID
        in: path
        name: id
        required: true
        type: integer
      - description: Validation decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ValidationActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Deposit status updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID or payload
        "500":
          description: Internal server error
      summary: Process deposit validation
      tags:
      - validation
  /admin/validations/events/{id}/:
    put:
      consumes:
      - application/json
      description: Approve or refuse an event
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: integer
      - description: Validation decision
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ValidationActionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Event status updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID or payload
        "404":
          description: Event not found
        "500":
          description: Internal server error
      summary: Process event validation
      tags:
      - validation
  /admin/validations/listings/:
    get:
      description: Get a paginated list of pending listings for admin
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Sort order
        in: query
        name: sort
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated listings
